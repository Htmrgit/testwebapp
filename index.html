<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPay Restaurant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 450px;
        }

        .btn-pay {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-pay:active {
            transform: scale(0.95);
        }

        #qrcode img {
            margin: 0 auto;
            border-radius: 12px;
            padding: 10px;
            background: white;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-weight: 600;
            display: none;
            z-index: 50;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Input styling */
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card p-6 md:p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                QuickPay Restaurant
            </h1>
            <p class="text-gray-400 text-sm mt-1 font-light italic">Fast. Secure. Seamless.</p>
        </div>

        <!-- Input Section -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1 ml-1">UPI ID</label>
                <input type="text" id="upiId" value="paytmqr6px9da@ptys" 
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 transition-all"
                    placeholder="Enter UPI ID">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1 ml-1">Amount (₹)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold text-lg">₹</span>
                    <input type="number" id="amount" 
                        class="w-full bg-white/10 border border-white/20 rounded-xl pl-10 pr-4 py-4 text-white text-2xl font-bold placeholder-gray-600 transition-all"
                        placeholder="0.00">
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-1 gap-3 mt-8">
            <button onclick="payVia('Paytm')" class="btn-pay w-full py-4 bg-[#00baf2] hover:bg-[#00a3d6] rounded-xl font-bold flex items-center justify-center gap-2">
                Pay via Paytm
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="payVia('PhonePe')" class="btn-pay py-4 bg-[#5f259f] hover:bg-[#4d1e82] rounded-xl font-bold text-sm">
                    PhonePe
                </button>
                <button onclick="payVia('GooglePay')" class="btn-pay py-4 bg-white text-gray-900 hover:bg-gray-100 rounded-xl font-bold text-sm">
                    Google Pay
                </button>
            </div>
        </div>

        <!-- Secondary Actions -->
        <div class="mt-8 space-y-3 pt-6 border-t border-white/10">
            <button onclick="sendWhatsApp()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Send via WhatsApp
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="copyLink()" class="py-3 bg-white/10 hover:bg-white/20 rounded-xl font-medium text-sm transition-colors border border-white/5">
                    Copy Link
                </button>
                <button onclick="toggleQR()" class="py-3 bg-white/10 hover:bg-white/20 rounded-xl font-medium text-sm transition-colors border border-white/5">
                    Show QR
                </button>
            </div>
        </div>

        <!-- QR Display -->
        <div id="qrContainer" class="hidden mt-6 text-center animate-fade-in">
            <div id="qrcode" class="inline-block p-4 bg-white rounded-2xl"></div>
            <p class="text-xs text-gray-400 mt-3 font-semibold uppercase tracking-widest">Scan to Pay</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Link Copied!</div>

    <script>
        const amountInput = document.getElementById('amount');
        const upiIdInput = document.getElementById('upiId');
        const qrContainer = document.getElementById('qrContainer');
        const qrDiv = document.getElementById('qrcode');
        let qrcodeInstance = null;

        // 1. Local Storage Management
        window.onload = () => {
            const lastAmount = localStorage.getItem('last_payment_amount');
            if (lastAmount) amountInput.value = lastAmount;
        };

        amountInput.addEventListener('input', (e) => {
            localStorage.setItem('last_payment_amount', e.target.value);
            if (!qrContainer.classList.contains('hidden')) {
                generateQR(); // Live update QR if visible
            }
        });

        // 2. Core UPI Logic
        function generateUPILink() {
            const amount = amountInput.value;
            const upiId = upiIdInput.value.trim();

            if (!amount || amount <= 0) {
                showToast("Please enter a valid amount", "#ef4444");
                return null;
            }

            // upi://pay?pa=paytmqr6px9da@ptys&pn=Restaurant&am=10&cu=INR
            return `upi://pay?pa=${encodeURIComponent(upiId)}&pn=Restaurant&am=${amount}&cu=INR`;
        }

        function payVia(platform) {
            const link = generateUPILink();
            if (link) {
                window.location.href = link;
            }
        }

        // 3. WhatsApp Integration
        function sendWhatsApp() {
            const amount = amountInput.value;
            const link = generateUPILink();
            if (!link) return;

            const message = `Hello, please complete your payment of ₹${amount} using this link: ${link}`;
            const encoded = encodeURIComponent(message);
            window.open(`https://wa.me/?text=${encoded}`, '_blank');
        }

        // 4. Utility Functions
        function copyLink() {
            const link = generateUPILink();
            if (!link) return;

            const tempInput = document.createElement("input");
            tempInput.value = link;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            showToast("UPI Link Copied!");
        }

        function showToast(msg, color = "#10b981") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = color;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        function toggleQR() {
            if (qrContainer.classList.contains('hidden')) {
                const link = generateUPILink();
                if (!link) return;
                
                qrContainer.classList.remove('hidden');
                generateQR();
                qrContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                qrContainer.classList.add('hidden');
            }
        }

        function generateQR() {
            const link = generateUPILink();
            if (!link) return;

            qrDiv.innerHTML = "";
            qrcodeInstance = new QRCode(qrDiv, {
                text: link,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
