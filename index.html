<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPay Restaurant Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            color: #f8fafc;
            padding: 1rem;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tab-btn {
            position: relative;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 10px;
        }

        .input-group:focus-within label {
            color: var(--primary);
        }

        input {
            background: rgba(15, 23, 42, 0.5) !important;
            transition: all 0.2s ease;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-paid { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- Header Section -->
    <header class="w-full max-w-md mb-6 mt-4 px-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold leading-tight">QuickPay</h1>
                <p class="text-xs text-gray-400">Restaurant Billing v2.0</p>
            </div>
        </div>
        <button onclick="clearAllData()" class="p-2 text-gray-400 hover:text-red-400 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </header>

    <!-- Main Navigation Tabs -->
    <div class="w-full max-w-md flex gap-8 px-6 mb-6 font-semibold text-sm text-gray-500">
        <button id="tab-payment" onclick="switchTab('payment')" class="tab-btn active">New Payment</button>
        <button id="tab-history" onclick="switchTab('history')" class="tab-btn">History</button>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-md">
        
        <!-- Tab 1: Payment Generation -->
        <div id="view-payment" class="space-y-4">
            <div class="glass-panel p-6">
                <div class="space-y-5">
                    <!-- Merchant ID -->
                    <div class="input-group">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Merchant UPI ID</label>
                        <input type="text" id="upiId" value="paytmqr6px9da@ptys" 
                            class="w-full border border-white/10 rounded-2xl px-4 py-3 text-white text-sm focus:ring-2 focus:ring-blue-500/50 outline-none">
                    </div>

                    <!-- Customer Phone -->
                    <div class="input-group">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Customer Number</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-semibold">+91</span>
                            <input type="tel" id="customerPhone" maxlength="10"
                                class="w-full border border-white/10 rounded-2xl pl-12 pr-4 py-3 text-white text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
                                placeholder="98XXXXXXXX">
                        </div>
                    </div>

                    <!-- Bill Amount -->
                    <div class="input-group">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Bill Amount (₹)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl font-bold">₹</span>
                            <input type="number" id="amount" 
                                class="w-full border border-white/10 rounded-2xl pl-10 pr-4 py-4 text-white text-3xl font-bold focus:ring-2 focus:ring-blue-500/50 outline-none"
                                placeholder="0">
                        </div>
                    </div>
                </div>

                <!-- Primary Action -->
                <div class="mt-8 space-y-3">
                    <button onclick="sendWhatsApp('payment')" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 active:scale-95 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-xl shadow-emerald-600/20">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        Send Payment Link
                    </button>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="copyLink()" class="py-3 bg-white/5 hover:bg-white/10 rounded-xl font-semibold text-xs border border-white/5 transition-all">
                            Copy Payment Link
                        </button>
                        <button onclick="toggleQR()" class="py-3 bg-white/5 hover:bg-white/10 rounded-xl font-semibold text-xs border border-white/5 transition-all">
                            Generate QR Code
                        </button>
                    </div>
                </div>
            </div>

            <!-- App Links Section -->
            <div class="glass-panel p-5">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1">Direct Pay (If on same phone)</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="openApp('Paytm')" class="flex flex-col items-center gap-1.5 p-3 rounded-2xl bg-[#00baf2]/10 border border-[#00baf2]/20 text-[#00baf2]">
                        <div class="w-8 h-8 rounded-lg bg-[#00baf2] flex items-center justify-center font-bold text-[10px] text-white">PAY</div>
                        <span class="text-[9px] font-bold">Paytm</span>
                    </button>
                    <button onclick="openApp('PhonePe')" class="flex flex-col items-center gap-1.5 p-3 rounded-2xl bg-[#5f259f]/10 border border-[#5f259f]/20 text-[#5f259f]">
                        <div class="w-8 h-8 rounded-lg bg-[#5f259f] flex items-center justify-center font-bold text-[10px] text-white">PP</div>
                        <span class="text-[9px] font-bold">PhonePe</span>
                    </button>
                    <button onclick="openApp('Google')" class="flex flex-col items-center gap-1.5 p-3 rounded-2xl bg-white/5 border border-white/10 text-white">
                        <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center font-bold text-[10px] text-black">G</div>
                        <span class="text-[9px] font-bold">G-Pay</span>
                    </button>
                </div>
            </div>

            <!-- QR Modal Display -->
            <div id="qrContainer" class="hidden glass-panel p-6 text-center animate-in fade-in zoom-in duration-300">
                <div id="qrcode" class="inline-block p-4 bg-white rounded-3xl mb-4"></div>
                <p class="text-sm font-bold text-gray-300">SCAN & PAY</p>
                <p id="qrAmountDisp" class="text-xs text-gray-500 mt-1"></p>
            </div>
        </div>

        <!-- Tab 2: Transaction History -->
        <div id="view-history" class="hidden space-y-3">
            <div id="historyList" class="space-y-3 no-scrollbar max-h-[70vh] overflow-y-auto">
                <!-- History Items -->
            </div>
        </div>

    </main>

    <!-- Global Toast UI -->
    <div id="toast" class="toast hidden bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-semibold text-sm">
        Link Copied Successfully!
    </div>

    <script>
        // State Management
        const state = {
            currentTab: 'payment',
            upiId: localStorage.getItem('qr_upi_id') || 'paytmqr6px9da@ptys',
            phone: localStorage.getItem('qr_phone') || '',
            amount: localStorage.getItem('qr_amount') || '',
            transactions: JSON.parse(localStorage.getItem('restaurant_txns') || '[]')
        };

        // DOM Elements
        const amountInp = document.getElementById('amount');
        const upiInp = document.getElementById('upiId');
        const phoneInp = document.getElementById('customerPhone');
        const historyList = document.getElementById('historyList');
        const qrContainer = document.getElementById('qrContainer');
        const qrDiv = document.getElementById('qrcode');

        // Initial Setup
        window.onload = () => {
            amountInp.value = state.amount;
            upiInp.value = state.upiId;
            phoneInp.value = state.phone;
            renderHistory();
        };

        // Sync inputs with local storage
        [amountInp, upiInp, phoneInp].forEach(input => {
            input.addEventListener('input', (e) => {
                const idMap = { amount: 'qr_amount', upiId: 'qr_upi_id', customerPhone: 'qr_phone' };
                localStorage.setItem(idMap[input.id], e.target.value);
                state[input.id === 'customerPhone' ? 'phone' : input.id] = e.target.value;
            });
        });

        // Tab Switching
        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('view-payment').classList.toggle('hidden', tab !== 'payment');
            document.getElementById('view-history').classList.toggle('hidden', tab !== 'history');
            
            if (tab === 'history') renderHistory();
        }

        // Logic Functions
        function generateUPILink() {
            if (!state.amount || state.amount <= 0) {
                showToast("Please enter a valid amount", "bg-red-500");
                return null;
            }
            return `upi://pay?pa=${encodeURIComponent(state.upiId)}&pn=Restaurant&am=${state.amount}&cu=INR`;
        }

        function handleTransaction(type) {
            const link = generateUPILink();
            if (!link) return null;

            // Save transaction logic
            const newTxn = {
                id: Date.now(),
                amount: state.amount,
                phone: state.phone || 'Walk-in',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString(),
                status: 'pending',
                link: link
            };
            
            state.transactions.unshift(newTxn);
            localStorage.setItem('restaurant_txns', JSON.stringify(state.transactions.slice(0, 50)));
            return newTxn;
        }

        function sendWhatsApp(mode, txnId = null) {
            let phone, message;

            if (mode === 'payment') {
                const txn = handleTransaction();
                if (!txn) return;
                
                phone = state.phone;
                if (!phone || phone.length < 10) {
                    showToast("Customer number required", "bg-red-500");
                    return;
                }
                
                // UPI Link visible message
                message = `🙏 Swagat Hai! Aapka bill ₹${state.amount} hai.\n\nKripya is link par click karke payment karein:\n${txn.link}\n\nDhanyawad! ✨`;
            } 
            else if (mode === 'thanks') {
                const txn = state.transactions.find(t => t.id === txnId);
                phone = txn.phone;
                message = `✅ Payment Received!\n\n₹${txn.amount} ki payment mil gayi hai. Aapka hamare restaurant par aane ke liye bohot bohot shukriya! 🙏\n\nJald hi fir milenge! 🥗🥘`;
            }

            const cleanPhone = phone.replace(/\D/g, '');
            const finalPhone = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
            window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function openApp(app) {
            const link = generateUPILink();
            if (link) {
                handleTransaction();
                window.location.href = link;
            }
        }

        function renderHistory() {
            if (state.transactions.length === 0) {
                historyList.innerHTML = `
                    <div class="glass-panel p-10 text-center opacity-50">
                        <svg class="w-12 h-12 mx-auto mb-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p class="text-sm">Abhi koi payment nahi hui hai.</p>
                    </div>`;
                return;
            }

            historyList.innerHTML = state.transactions.map(t => `
                <div class="glass-panel p-4 flex items-center justify-between group transition-all hover:bg-white/10">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-lg font-bold text-white">₹${t.amount}</span>
                            <span class="status-badge status-${t.status}" onclick="cycleStatus(${t.id})">${t.status}</span>
                        </div>
                        <div class="text-[10px] text-gray-400 flex items-center gap-2">
                            <span>${t.time}</span>
                            <span>•</span>
                            <span class="font-medium">${t.phone}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="sendWhatsApp('thanks', ${t.id})" 
                            class="p-2 bg-blue-600/10 hover:bg-blue-600/30 text-blue-400 rounded-xl transition-all" title="Send Thank You">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                        <button onclick="deleteTxn(${t.id})" class="p-2 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Utility Functions
        function cycleStatus(id) {
            const txn = state.transactions.find(t => t.id === id);
            const flow = { pending: 'paid', paid: 'failed', failed: 'pending' };
            txn.status = flow[txn.status];
            localStorage.setItem('restaurant_txns', JSON.stringify(state.transactions));
            renderHistory();
        }

        function deleteTxn(id) {
            state.transactions = state.transactions.filter(t => t.id !== id);
            localStorage.setItem('restaurant_txns', JSON.stringify(state.transactions));
            renderHistory();
        }

        function clearAllData() {
            if(confirm("Saara data clear kar de?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function copyLink() {
            const link = generateUPILink();
            if(!link) return;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Link Copy Ho Gaya!");
        }

        function showToast(msg, colorClass = "bg-blue-600") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `toast ${colorClass} text-white px-6 py-3 rounded-2xl shadow-2xl font-semibold text-sm`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function toggleQR() {
            if (qrContainer.classList.contains('hidden')) {
                const link = generateUPILink();
                if (!link) return;
                qrContainer.classList.remove('hidden');
                qrDiv.innerHTML = "";
                document.getElementById('qrAmountDisp').innerText = `Amount: ₹${state.amount}`;
                new QRCode(qrDiv, {
                    text: link, width: 200, height: 200,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                qrContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                qrContainer.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
